name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'CRs/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'CRs/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build
        run: dotnet build Jacquard.sln --configuration Release

      - name: Test
        run: dotnet test Jacquard.sln --configuration Release --verbosity normal

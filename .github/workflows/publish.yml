name: Publish to NuGet

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest

    # Only the repo owner may trigger a publish by pushing a v* tag.
    # Any tag pushed by another actor causes the job to exit cleanly without publishing.
    if: github.actor == 'apncodes'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Pack
        run: dotnet pack StrandsAgents.sln --configuration Release --output ./artifacts

      - name: Push to NuGet
        run: |
          dotnet nuget push ./artifacts/*.nupkg \
            --api-key ${{ secrets.get_key }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
